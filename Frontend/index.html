<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Manager</title>
<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #0a0a0a; /* Deep black/gray */
        color: #ffffff; /* White text */
        padding: 40px 20px; 
        margin: 0; 
    }
    .container { 
        max-width: 900px; 
        margin: auto; 
        background: #141414; /* Slightly lighter dark background */
        padding: 30px; 
        border-radius: 8px; 
        border: 2px solid #00ff00; /* Neon green border */
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.15); /* Subtle green glow */
    }
    h1 { 
        color: #ffffff; 
        margin-top: 0;
    }
    table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 25px; 
    }
    th, td { 
        padding: 15px; 
        text-align: left; 
        border-bottom: 1px solid #333333; 
    }
    th { 
        background-color: #1a1a1a; 
        color: #00ff00; /* Neon text for headers */
        border-bottom: 2px solid #00ff00; 
    }
    
    /* "Add New" Button - Outline Style */
    .btn { 
        display: inline-block;
        padding: 10px 20px; 
        text-decoration: none; 
        color: #00ff00; 
        background-color: transparent; 
        border: 2px solid #00ff00; 
        border-radius: 5px; 
        font-weight: bold;
        transition: 0.3s;
    }
    .btn:hover { 
        background-color: #00ff00; 
        color: #000000; 
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }
    
    /* Table Action Buttons */
    td .btn { 
        padding: 6px 12px;
        border: none;
        color: black;
    }
    td .btn:hover { box-shadow: none; transform: scale(1.05); }
    .btn-danger { background-color: #dc3545; color: white !important; }
</style>
</head>
<body>
    <div class="container">
        <h1>Inventory Dashboard</h1>
        <a href="form.html" class="btn">Add New Product</a>
        
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Price (Rs)</th>
                    <th>Quantity in Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const apiUrl = 'http://localhost:5185/api/products'; 
        
        async function loadProducts() {
            try {
                const response = await fetch(apiUrl);
                const products = await response.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                products.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td>${p.name}</td>
                        <td>Rs. ${p.price}</td>
                        <td>${p.quantity}</td>
                        <td>
                            <a href="form.html?id=${p.id}" class="btn" style="background-color: #ffc107; color: black;">Edit</a>
                            <button onclick="deleteProduct('${p.id}')" class="btn btn-danger">Delete</button>
                        </td>
                    </tr>`;
                });
            } catch (error) {
                console.error("Error fetching data. Is the backend running?", error);
            }
        }

        async function deleteProduct(id) {
            if(confirm('Are you absolutely sure you want to delete this product?')) {
                await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
                loadProducts(); 
            }
        }

        loadProducts();
    </script>
</body>
</html>
